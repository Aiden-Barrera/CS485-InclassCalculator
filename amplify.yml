version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "=== Node/npm versions ==="
        - node -v
        - npm -v
        - echo "=== Installing dependencies ==="
        - cd client && npm install
    build:
      commands:
        - echo "=== Building app ==="
        - npm run build
        - echo "=== Build complete ==="
  artifacts:
    baseDirectory: client/dist
    files:
      - '**/*'
  cache:
    paths:
      - client/node_modules/**/*
